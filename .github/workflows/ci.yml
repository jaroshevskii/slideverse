name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    # Slideverse targets the iOS 26 SDK (Xcode 26), which ships on the
    # GitHub-hosted macos-26 image.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Build & test package
        run: swift test

      - name: Build app (workspace)
        run: |
          xcodebuild \
            -workspace Slideverse.xcworkspace \
            -scheme Slideverse \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            build
